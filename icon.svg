<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- 深色背景漸層 -->
    <radialGradient id="bg" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#1c1c38"/>
      <stop offset="100%" stop-color="#08080f"/>
    </radialGradient>

    <!-- 金色球主體 -->
    <radialGradient id="ballGold" cx="36%" cy="32%" r="60%">
      <stop offset="0%" stop-color="#fff8c0"/>
      <stop offset="35%" stop-color="#f5c842"/>
      <stop offset="75%" stop-color="#d4900a"/>
      <stop offset="100%" stop-color="#8a5500"/>
    </radialGradient>

    <!-- 金色球高光 -->
    <radialGradient id="shine" cx="35%" cy="28%" r="40%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.65)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>

    <!-- 紫色特別號球 -->
    <radialGradient id="ballPurple" cx="36%" cy="32%" r="60%">
      <stop offset="0%" stop-color="#f0c0ff"/>
      <stop offset="35%" stop-color="#bf55ff"/>
      <stop offset="75%" stop-color="#8800cc"/>
      <stop offset="100%" stop-color="#45006a"/>
    </radialGradient>

    <!-- 外圈金色光暈 -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowPurple" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- 星星閃光 -->
    <filter id="starGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- 背景圓角正方形 -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- 星點裝飾 -->
  <g opacity="0.5" filter="url(#starGlow)">
    <circle cx="60"  cy="80"  r="2" fill="#f5c842"/>
    <circle cx="440" cy="60"  r="1.5" fill="#fff"/>
    <circle cx="480" cy="140" r="2" fill="#bf55ff"/>
    <circle cx="40"  cy="400" r="1.5" fill="#fff"/>
    <circle cx="470" cy="420" r="2" fill="#f5c842"/>
    <circle cx="100" cy="460" r="1.5" fill="#bf55ff"/>
    <circle cx="390" cy="480" r="2" fill="#fff"/>
    <circle cx="30"  cy="200" r="1.5" fill="#f5c842"/>
    <circle cx="490" cy="300" r="1.5" fill="#fff"/>
  </g>

  <!-- ── 大金色主球（左下，主角） ── -->
  <g filter="url(#glow)">
    <circle cx="190" cy="300" r="148" fill="rgba(245,200,66,0.18)"/>
    <circle cx="190" cy="300" r="138" fill="url(#ballGold)"/>
    <!-- 立體感陰影弧 -->
    <ellipse cx="220" cy="370" rx="90" ry="30" fill="rgba(0,0,0,0.18)" transform="rotate(-10,220,370)"/>
    <!-- 高光 -->
    <circle cx="190" cy="300" r="138" fill="url(#shine)"/>
    <!-- 赤道腰帶 -->
    <ellipse cx="190" cy="300" rx="138" ry="28" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="2"/>
    <!-- 數字 49 -->
    <text x="190" y="280" text-anchor="middle" dominant-baseline="middle"
      font-family="'Arial Black', 'Helvetica Neue', sans-serif"
      font-size="90" font-weight="900"
      fill="#3d2000" letter-spacing="-2">4</text>
    <text x="190" y="348" text-anchor="middle" dominant-baseline="middle"
      font-family="'Arial Black', 'Helvetica Neue', sans-serif"
      font-size="90" font-weight="900"
      fill="#3d2000" letter-spacing="-2">9</text>
  </g>

  <!-- ── 小紫色特別號球（右上） ── -->
  <g filter="url(#glowPurple)">
    <circle cx="360" cy="165" r="92" fill="rgba(191,85,255,0.2)"/>
    <circle cx="360" cy="165" r="84" fill="url(#ballPurple)"/>
    <!-- 高光 -->
    <radialGradient id="shineP" cx="35%" cy="28%" r="40%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.55)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
    <circle cx="360" cy="165" r="84" fill="url(#shineP)"/>
    <!-- 赤道帶 -->
    <ellipse cx="360" cy="165" rx="84" ry="17" fill="none" stroke="rgba(255,255,255,0.14)" stroke-width="1.5"/>
    <!-- 特別號符號 ★ -->
    <text x="360" y="172" text-anchor="middle" dominant-baseline="middle"
      font-family="'Arial Black', 'Helvetica Neue', sans-serif"
      font-size="62" font-weight="900"
      fill="#fff" opacity="0.95">★</text>
  </g>

  <!-- 金色外環細節線 -->
  <circle cx="190" cy="300" r="138" fill="none" stroke="rgba(245,200,66,0.4)" stroke-width="2"/>
  <circle cx="360" cy="165" r="84"  fill="none" stroke="rgba(191,85,255,0.4)" stroke-width="1.5"/>
</svg>
