<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>大樂透開獎機</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+TC:wght@400;700;900&display=swap');

:root {
  --gold:#f5c842; --gold-d:#c8860a; --gold-l:#fff0a0;
  --purple:#bf55ff; --purple-d:#6a00ab;
  --green:#22aa55;
  --bg:#08080f; --panel:#13131f; --panel2:#1a1a2e;
  --border:#25253a; --text:#f0e8d0; --dim:#777799;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  background:var(--bg); color:var(--text);
  font-family:'Noto Sans TC',sans-serif;
  min-height:100vh; display:flex; flex-direction:column; align-items:center;
  overflow-x:hidden;
}
body::before{
  content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
  background:
    radial-gradient(1px 1px at 15% 25%,rgba(245,200,66,.35) 0%,transparent 100%),
    radial-gradient(1px 1px at 75% 10%,rgba(255,255,255,.25) 0%,transparent 100%),
    radial-gradient(1px 1px at 45% 75%,rgba(191,85,255,.3) 0%,transparent 100%),
    radial-gradient(1px 1px at 88% 60%,rgba(255,255,255,.15) 0%,transparent 100%),
    radial-gradient(2px 2px at 35% 12%,rgba(255,255,255,.18) 0%,transparent 100%),
    radial-gradient(1px 1px at 60% 40%,rgba(245,200,66,.12) 0%,transparent 100%);
}

/* ── HEADER ── */
header{position:relative;z-index:1;text-align:center;padding:26px 20px 10px;width:100%;}
.title-main{
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(38px,8vw,70px); letter-spacing:.18em;
  background:linear-gradient(135deg,#fff0a0 0%,#f5c842 45%,#c8860a 100%);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
  filter:drop-shadow(0 0 18px rgba(245,200,66,.5)); line-height:1;
}
.title-sub{font-size:12px;letter-spacing:.4em;color:var(--dim);margin-top:4px;}
.divider{width:180px;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:12px auto;}

/* ── TABS ── */
.tabs{
  position:relative;z-index:1;display:flex;gap:0;margin-bottom:0;
  width:min(720px,98vw);
}
.tab-btn{
  flex:1;padding:10px 0;font-family:'Noto Sans TC',sans-serif;font-size:13px;font-weight:700;
  letter-spacing:.1em;border:1px solid var(--border);border-bottom:none;
  background:var(--bg);color:var(--dim);cursor:pointer;transition:all .2s;
}
.tab-btn:first-child{border-radius:12px 0 0 0;}
.tab-btn:last-child{border-radius:0 12px 0 0;}
.tab-btn.active{background:var(--panel);color:var(--gold);border-color:rgba(245,200,66,.3);}

/* ── PANEL ── */
.panel-wrap{
  position:relative;z-index:1;width:min(720px,98vw);
  background:linear-gradient(160deg,var(--panel) 0%,var(--panel2) 100%);
  border:1px solid var(--border);border-radius:0 0 20px 20px;padding:20px;
  box-shadow:0 8px 60px rgba(0,0,0,.65),inset 0 1px 0 rgba(255,255,255,.04);
  margin-bottom:20px;
}
.tab-panel{display:none;}
.tab-panel.active{display:block;}

/* ── DRUM ── */
.drum-section{
  background:radial-gradient(ellipse at 50% 30%,#1c1c38 0%,#0c0c18 100%);
  border:1px solid var(--border);border-radius:14px;padding:14px 10px 10px;
  position:relative;overflow:hidden;
}
.drum-section::before{
  content:'';position:absolute;inset:0;pointer-events:none;
  background:repeating-linear-gradient(0deg,transparent,transparent 18px,rgba(255,255,255,.01) 18px,rgba(255,255,255,.01) 19px);
}
.drum-label{font-size:10px;letter-spacing:.35em;color:var(--dim);text-align:center;margin-bottom:10px;}
.drum-grid{display:flex;flex-wrap:wrap;gap:4px;justify-content:center;}
.drum-ball{
  width:30px;height:30px;border-radius:50%;
  background:radial-gradient(circle at 35% 30%,#35355a,#18182a);
  border:1px solid #2a2a44;
  display:flex;align-items:center;justify-content:center;
  font-size:10.5px;font-weight:700;color:#5a5a88;
  font-family:'Bebas Neue',sans-serif;letter-spacing:.05em;
  transition:all .2s;position:relative;
}
.drum-ball.drawn{
  background:radial-gradient(circle at 35% 30%,#1e1e28,#111118);
  border-color:#1a1a28;color:#252530;transform:scale(.8);opacity:.35;
}
.drum-ball.rolling{
  background:radial-gradient(circle at 35% 30%,var(--gold-l),var(--gold-d));
  border-color:var(--gold);color:#6a3800;
  box-shadow:0 0 12px rgba(245,200,66,.75);
  /* JS will add random transform offsets */
}
@keyframes droll{
  0%  {transform:translate(var(--tx1),var(--ty1)) rotate(-5deg);}
  25% {transform:translate(var(--tx2),var(--ty2)) rotate(2deg);}
  50% {transform:translate(var(--tx3),var(--ty3)) rotate(-3deg);}
  75% {transform:translate(var(--tx1),var(--ty2)) rotate(4deg);}
  100%{transform:translate(var(--tx2),var(--ty1)) rotate(-2deg);}
}

/* ── CHUTE ── */
.chute-row{display:flex;align-items:center;justify-content:center;gap:14px;margin:16px 0;}
.chute-pipe{width:3px;height:32px;background:linear-gradient(180deg,var(--gold-d),var(--gold));border-radius:2px;opacity:.5;}
.exit-slot{
  width:80px;height:80px;border-radius:50%;
  background:radial-gradient(circle at 35% 35%,#f5c842,#e8a020);
  border:3px solid var(--gold);
  display:flex;align-items:center;justify-content:center;
  font-family:'Bebas Neue',sans-serif;font-size:36px;color:#3d2000;
  box-shadow:0 0 0 6px rgba(245,200,66,.12),0 0 28px rgba(245,200,66,.3),inset 0 2px 4px rgba(255,255,255,.3);
  transition:all .4s;letter-spacing:.05em;
}
.exit-slot.empty{background:radial-gradient(circle at 35% 35%,#262638,#13131e);border-color:#282840;color:#282840;box-shadow:none;}
.exit-slot.special{background:radial-gradient(circle at 35% 35%,#e080ff,#8800cc);border-color:var(--purple);color:#fff;box-shadow:0 0 0 6px rgba(191,85,255,.18),0 0 38px rgba(191,85,255,.5),inset 0 2px 4px rgba(255,200,255,.3);}
.exit-slot.pop{animation:bpop .38s cubic-bezier(.36,.07,.19,.97);}
@keyframes bpop{0%{transform:scale(.5);opacity:.5;}60%{transform:scale(1.2);}100%{transform:scale(1);opacity:1;}}
.special-glow{animation:spulse .75s infinite alternate!important;}
@keyframes spulse{from{transform:scale(1);box-shadow:0 0 28px rgba(191,85,255,.5);}to{transform:scale(1.08);box-shadow:0 0 55px rgba(255,58,255,.9),0 0 0 8px rgba(191,85,255,.22);}}

.rolling-num{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--gold);opacity:0;text-align:center;min-height:26px;transition:opacity .2s;}
.rolling-num.on{opacity:1;}

/* ── STATUS ── */
.status-bar{text-align:center;font-size:13px;color:var(--dim);margin:4px 0 14px;min-height:20px;letter-spacing:.05em;transition:color .3s;}
.status-bar.gold{color:var(--gold);font-weight:700;}

/* ── CONTROLS ── */
.controls{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}
.btn{font-family:'Noto Sans TC',sans-serif;font-weight:900;font-size:14px;letter-spacing:.1em;padding:11px 24px;border-radius:50px;border:none;cursor:pointer;transition:all .18s;}
.btn:active{transform:scale(.94)!important;}
.btn-start{background:linear-gradient(135deg,#f5c842,#c8860a);color:#3d2000;box-shadow:0 4px 18px rgba(245,200,66,.38);}
.btn-start:hover:not(:disabled){box-shadow:0 4px 28px rgba(245,200,66,.65);transform:translateY(-1px);}
.btn-stop{background:linear-gradient(135deg,#ff5555,#cc0000);color:#fff;box-shadow:0 4px 18px rgba(200,0,0,.38);}
.btn-stop:hover:not(:disabled){box-shadow:0 4px 28px rgba(255,0,0,.55);transform:translateY(-1px);}
.btn-reset{background:var(--panel2);color:var(--dim);border:1px solid var(--border);}
.btn-reset:hover:not(:disabled){color:var(--text);border-color:#44446a;}
.btn:disabled{opacity:.3;cursor:not-allowed;transform:none!important;box-shadow:none!important;}

/* ── RESULT GROUPS ── */
.result-group{background:rgba(255,255,255,.025);border:1px solid var(--border);border-radius:14px;padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;gap:10px;transition:all .3s;position:relative;overflow:hidden;}
.result-group.active{border-color:rgba(245,200,66,.35);box-shadow:0 0 18px rgba(245,200,66,.07);}
.result-group.active::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:linear-gradient(180deg,var(--gold),var(--gold-d));border-radius:3px 0 0 3px;}
.group-num{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--dim);width:22px;flex-shrink:0;text-align:center;}
.result-group.active .group-num{color:var(--gold);}
.group-balls{display:flex;gap:6px;flex:1;flex-wrap:wrap;}
.result-ball{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:17px;letter-spacing:.05em;background:radial-gradient(circle at 35% 35%,#f5c842,#c8760a);color:#3d2000;border:2px solid var(--gold-d);box-shadow:0 2px 8px rgba(0,0,0,.4),inset 0 1px 2px rgba(255,255,255,.2);animation:bappear .32s cubic-bezier(.36,.07,.19,.97);}
.result-ball.special-ball{background:radial-gradient(circle at 35% 35%,#e080ff,#8800cc);color:#fff;border-color:#aa00dd;box-shadow:0 2px 12px rgba(191,85,255,.45),inset 0 1px 2px rgba(255,200,255,.25);}
.result-ball.empty-ball{background:radial-gradient(circle at 35% 35%,#202032,#12121c);border:2px dashed #252535;box-shadow:none;animation:none;}
@keyframes bappear{from{transform:scale(0) rotate(-180deg);opacity:0;}to{transform:scale(1) rotate(0deg);opacity:1;}}
.sep{width:1px;height:28px;background:linear-gradient(180deg,transparent,var(--border),transparent);flex-shrink:0;}
.sort-badge{font-size:11px;color:var(--dim);background:var(--panel2);border:1px solid var(--border);border-radius:20px;padding:3px 9px;cursor:pointer;transition:all .2s;white-space:nowrap;flex-shrink:0;}
.sort-badge:hover{color:var(--gold);border-color:rgba(245,200,66,.35);}
.sort-badge.done{opacity:.4;cursor:default;}

/* ── REPORT ── */
.report-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px;}
.report-title{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--gold);letter-spacing:.15em;}
.report-actions{display:flex;gap:8px;flex-wrap:wrap;}
.btn-action{font-family:'Noto Sans TC',sans-serif;font-size:12px;font-weight:700;letter-spacing:.08em;padding:7px 15px;border-radius:50px;border:none;cursor:pointer;transition:all .18s;}
.btn-sort-all{background:linear-gradient(135deg,#4488ff,#2255bb);color:#fff;box-shadow:0 3px 12px rgba(68,136,255,.3);}
.btn-sort-all:hover:not(:disabled){box-shadow:0 3px 20px rgba(68,136,255,.55);transform:translateY(-1px);}
.btn-export{background:linear-gradient(135deg,#22aa55,#116633);color:#fff;box-shadow:0 3px 12px rgba(34,170,85,.3);}
.btn-export:hover:not(:disabled){box-shadow:0 3px 20px rgba(34,170,85,.55);transform:translateY(-1px);}
.btn-action:disabled{opacity:.3;cursor:not-allowed;}

.report-empty{text-align:center;color:var(--dim);padding:40px 20px;font-size:13px;letter-spacing:.1em;}
.report-card{background:rgba(255,255,255,.025);border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:10px;}
.rc-head{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
.rc-num{font-family:'Bebas Neue',sans-serif;font-size:26px;color:var(--gold);line-height:1;}
.rc-label{font-size:11px;color:var(--dim);letter-spacing:.2em;}
.rc-sorted-tag{display:inline-block;font-size:10px;color:var(--gold);border:1px solid rgba(245,200,66,.4);border-radius:10px;padding:1px 7px;margin-top:2px;}
.rc-time{font-size:11px;color:var(--dim);margin-left:auto;}
.rc-balls{display:flex;gap:6px;flex-wrap:wrap;align-items:center;}
.rc-ball{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:16px;background:radial-gradient(circle at 35% 35%,#f5c842,#c8760a);color:#3d2000;border:2px solid var(--gold-d);box-shadow:0 2px 6px rgba(0,0,0,.3);}
.rc-ball.sp{background:radial-gradient(circle at 35% 35%,#e080ff,#8800cc);color:#fff;border-color:#aa00dd;}
.rc-divider{width:1px;height:28px;background:var(--border);margin:0 4px;align-self:center;}

/* saved badge */
.saved-badge{
  position:fixed;bottom:70px;right:16px;z-index:200;
  background:rgba(34,170,85,.9);color:#fff;font-size:12px;font-weight:700;
  padding:6px 14px;border-radius:20px;letter-spacing:.1em;
  opacity:0;transition:opacity .4s;pointer-events:none;
}
.saved-badge.show{opacity:1;}

/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:500;display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeIn .25s;}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
.modal{background:linear-gradient(160deg,var(--panel),var(--panel2));border:1px solid rgba(245,200,66,.3);border-radius:20px;padding:24px;width:min(560px,96vw);max-height:90vh;overflow-y:auto;box-shadow:0 20px 80px rgba(0,0,0,.8);}
.modal-title{font-family:'Bebas Neue',sans-serif;font-size:24px;color:var(--gold);letter-spacing:.2em;margin-bottom:4px;text-align:center;}
.modal-sub{font-size:11px;color:var(--dim);letter-spacing:.2em;text-align:center;margin-bottom:18px;}
.modal-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);}
.modal-row:last-child{border-bottom:none;}
.modal-idx{font-family:'Bebas Neue',sans-serif;font-size:18px;color:var(--dim);width:24px;}
.modal-balls{display:flex;gap:5px;flex:1;flex-wrap:wrap;}
.modal-ball{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:15px;background:radial-gradient(circle at 35% 35%,#f5c842,#c8760a);color:#3d2000;border:2px solid var(--gold-d);}
.modal-ball.sp{background:radial-gradient(circle at 35% 35%,#e080ff,#8800cc);color:#fff;border-color:#aa00dd;}
.modal-close{display:block;margin:18px auto 0;font-family:'Noto Sans TC',sans-serif;font-weight:700;font-size:14px;padding:10px 32px;border-radius:50px;border:none;cursor:pointer;background:linear-gradient(135deg,var(--gold),var(--gold-d));color:#3d2000;}

/* ── TOOLBAR BUTTONS (mute/tts) ── */
.toolbar{position:fixed;bottom:16px;right:16px;z-index:100;display:flex;flex-direction:column;gap:8px;}
.tool-btn{width:40px;height:40px;border-radius:50%;border:1px solid var(--border);background:var(--panel2);color:var(--dim);font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.tool-btn:hover{color:var(--text);border-color:#44446a;}
.tool-btn.on{color:var(--gold);border-color:rgba(245,200,66,.4);}

footer{position:relative;z-index:1;color:var(--dim);font-size:11px;letter-spacing:.2em;padding-bottom:20px;text-align:center;opacity:.4;}
</style>

<body>

<header>
  <div class="title-main">大樂透開獎機</div>
  <div class="title-sub">TAIWAN LOTTO · 6+1 DRAW · 7×7=49 SHARED POOL</div>
  <div class="divider"></div>
</header>

<div class="tabs">
  <button class="tab-btn active" onclick="switchTab('draw')">🎱 開獎</button>
  <button class="tab-btn" onclick="switchTab('report')" id="tabReport">📊 報告</button>
</div>

<div class="panel-wrap">

  <!-- ══ DRAW PANEL ══ -->
  <div class="tab-panel active" id="panelDraw">
    <div class="drum-section">
      <div class="drum-label">球　池　1 — 49</div>
      <div class="drum-grid" id="drumGrid"></div>
    </div>
    <div class="chute-row">
      <div class="chute-pipe"></div>
      <div class="exit-slot empty" id="exitSlot">?</div>
      <div class="chute-pipe"></div>
    </div>
    <div class="rolling-num" id="rollingNum">● ● ●</div>
    <div class="status-bar" id="statusText">按「開始」啟動滾筒</div>
    <div class="controls" style="margin-bottom:18px;">
      <button class="btn btn-start" id="btnStart" onclick="startMachine()">▶ 開 始</button>
      <button class="btn btn-stop"  id="btnStop"  onclick="stopBall()"    disabled>⏹ 停 球</button>
      <button class="btn btn-reset" id="btnReset" onclick="resetAll()"    disabled>↺ 重 置</button>
    </div>
    <div id="resultsContainer"></div>
  </div>

  <!-- ══ REPORT PANEL ══ -->
  <div class="tab-panel" id="panelReport">
    <div class="report-header">
      <div class="report-title">📋 開獎報告</div>
      <div class="report-actions">
        <button class="btn-action btn-sort-all" id="btnSortAll" onclick="sortAllGroups()" disabled>⇅ 全部排序</button>
        <button class="btn-action btn-export"   id="btnExport"  onclick="exportExcel()"  disabled>⬇ 匯出 Excel</button>
      </div>
    </div>
    <div id="reportContent">
      <div class="report-empty">尚無開獎記錄<br><span style="font-size:11px;opacity:.6">完成至少一組後即可查看</span></div>
    </div>
  </div>

</div>

<!-- Toolbar -->
<div class="toolbar">
  <button class="tool-btn on" id="ttsBtn"  onclick="toggleTTS()"  title="語音播報">🗣</button>
  <button class="tool-btn on" id="muteBtn" onclick="toggleMute()" title="音效開關">🔊</button>
</div>

<!-- Saved badge -->
<div class="saved-badge" id="savedBadge">✓ 已自動儲存</div>

<!-- Confirm Reset Modal -->
<div class="modal-overlay" id="confirmOverlay" style="display:none">
  <div class="modal" style="max-width:320px;text-align:center;">
    <div class="modal-title" style="font-size:20px;">⚠️ 確認重置</div>
    <div style="font-size:13px;color:var(--dim);margin:12px 0 20px;line-height:1.7;">
      將清除全部 7 組記錄<br>及共用球池，無法復原。
    </div>
    <div style="display:flex;gap:10px;justify-content:center;">
      <button onclick="cancelReset()" style="flex:1;padding:11px 0;border-radius:50px;border:1px solid var(--border);background:var(--panel2);color:var(--dim);font-family:'Noto Sans TC',sans-serif;font-weight:700;font-size:14px;cursor:pointer;">取 消</button>
      <button onclick="doReset()" style="flex:1;padding:11px 0;border-radius:50px;border:none;background:linear-gradient(135deg,#ff5555,#cc0000);color:#fff;font-family:'Noto Sans TC',sans-serif;font-weight:700;font-size:14px;cursor:pointer;">確認重置</button>
    </div>
  </div>
</div>

<!-- Modal overlay -->
<div class="modal-overlay" id="modalOverlay" style="display:none" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-title">🏆 全組開獎結果</div>
    <div class="modal-sub">7 ROUNDS COMPLETE · TAIWAN LOTTO</div>
    <div id="modalBody"></div>
    <button class="modal-close" onclick="document.getElementById('modalOverlay').style.display='none'">關 閉</button>
  </div>
</div>

<footer>本程式僅供娛樂 · Fisher-Yates 公平演算法 · 與真實彩券無關</footer>

let actx=null, muted=false, ttsOn=true;

function getCtx(){
  if(!actx) actx=new(window.AudioContext||window.webkitAudioContext)();
  if(actx.state==='suspended') actx.resume();
  return actx;
}
function playTone(freq,dur,type='sine',vol=0.18,delay=0){
  if(muted) return;
  const ac=getCtx(), o=ac.createOscillator(), g=ac.createGain();
  o.connect(g); g.connect(ac.destination);
  o.type=type; o.frequency.setValueAtTime(freq,ac.currentTime+delay);
  g.gain.setValueAtTime(0,ac.currentTime+delay);
  g.gain.linearRampToValueAtTime(vol,ac.currentTime+delay+0.01);
  g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+delay+dur);
  o.start(ac.currentTime+delay); o.stop(ac.currentTime+delay+dur+0.02);
}
function playNoise(dur,vol=0.06){
  if(muted) return;
  const ac=getCtx(), sz=ac.sampleRate*dur, buf=ac.createBuffer(1,sz,ac.sampleRate);
  const d=buf.getChannelData(0); for(let i=0;i<sz;i++) d[i]=(Math.random()*2-1);
  const src=ac.createBufferSource(); src.buffer=buf;
  const g=ac.createGain(); g.gain.setValueAtTime(vol,ac.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+dur);
  src.connect(g); g.connect(ac.destination);
  src.start(); src.stop(ac.currentTime+dur);
}

let rollTimers=[];
function startRollSound(){
  stopRollSound();
  const fire=()=>{
    playNoise(0.1,0.04); playTone(80+Math.random()*40,0.07,'triangle',0.04);
    rollTimers.push(setTimeout(fire,85+Math.random()*55));
  };
  fire();
}
function stopRollSound(){ rollTimers.forEach(t=>clearTimeout(t)); rollTimers=[]; }

function playSFXStop(isSpecial){
  if(isSpecial){
    [523,659,784,1047].forEach((f,i)=>playTone(f,.4,'sine',.15,i*.07));
    setTimeout(()=>[523,659,784,1047].forEach((f,i)=>playTone(f,.55,'triangle',.1,i*.05)),350);
    playNoise(.15,.08);
  } else {
    playTone(200,.08,'square',.12);
    playTone(880,.18,'sine',.1,.04);
    playNoise(.06,.06);
  }
}
function playSFXComplete(){
  [523,659,784,1047,1319].forEach((f,i)=>playTone(f,.35,'sine',.18,i*.1));
  setTimeout(()=>[523,659,784].forEach((f,i)=>playTone(f,.6,'triangle',.12,i*.06)),700);
}
function playSFXStart(){
  playNoise(.1,.06); playTone(150,.15,'sawtooth',.08,.05); playTone(200,.1,'sawtooth',.06,.12);
}
function toggleMute(){
  muted=!muted;
  document.getElementById('muteBtn').textContent=muted?'🔇':'🔊';
  document.getElementById('muteBtn').classList.toggle('on',!muted);
}

// ══════════════════════════════════════
//  TTS
// ══════════════════════════════════════
function speakNumber(num, isSpecial){
  if(!ttsOn||muted) return;
  window.speechSynthesis.cancel();
  const text = isSpecial ? `特別號 ${num}` : String(num);
  const msg=new SpeechSynthesisUtterance(text);
  msg.lang='zh-TW'; msg.rate=1.15; msg.pitch=isSpecial?1.3:1.0;
  msg.volume=0.9;
  // prefer TW voice
  const voices=window.speechSynthesis.getVoices();
  const twVoice=voices.find(v=>v.lang==='zh-TW')||voices.find(v=>v.lang.startsWith('zh'));
  if(twVoice) msg.voice=twVoice;
  window.speechSynthesis.speak(msg);
}
function toggleTTS(){
  ttsOn=!ttsOn;
  document.getElementById('ttsBtn').classList.toggle('on',ttsOn);
}
// preload voices
window.speechSynthesis.getVoices();
window.speechSynthesis.onvoiceschanged=()=>window.speechSynthesis.getVoices();

// ══════════════════════════════════════
//  STATE
// ══════════════════════════════════════
let isRunning=false, drawnCount=0;
let currentGroup=0, groups=[], completedGroups=[];
let rollInterval=null;
// 共用球池：7×7=49顆，全程不重複
let globalPool=[];   // 洗好的49顆順序
let globalIdx=0;     // 下一顆要取的位置
let globalDrawn=new Set(); // 已抽出的號碼集合
const TOTAL=7;

// ══════════════════════════════════════
//  LOCALSTORAGE
// ══════════════════════════════════════
const LS_KEY='lotto_records_v3';
function saveToLS(){
  try{
    localStorage.setItem(LS_KEY,JSON.stringify({
      completedGroups,
      globalPool,
      globalIdx,
      globalDrawn:[...globalDrawn]
    }));
  }catch(e){}
  flashSaved();
}
function loadFromLS(){
  try{
    const raw=localStorage.getItem(LS_KEY);
    if(raw){
      const saved=JSON.parse(raw);
      completedGroups=saved.completedGroups||[];
      globalPool=saved.globalPool||buildPool();
      globalIdx=saved.globalIdx||0;
      globalDrawn=new Set(saved.globalDrawn||[]);
      currentGroup=completedGroups.length;
      updateReport();
      rebuildDrawPanelFromSave();
      // 還原球池 drawn 外觀
      globalDrawn.forEach(n=>{
        const el=document.getElementById('drum-'+n);
        if(el){el.className='drum-ball drawn';el.style.cssText='';}
      });
      if(currentGroup>=TOTAL) setBtns(false,false,true);
      else if(currentGroup>0) setBtns(true,false,true);
    }
  }catch(e){ completedGroups=[]; }
}
function flashSaved(){
  const b=document.getElementById('savedBadge');
  b.classList.add('show');
  setTimeout(()=>b.classList.remove('show'),1800);
}

// ══════════════════════════════════════
//  INIT
// ══════════════════════════════════════
buildDrum(); buildResultGroups();

window.addEventListener('load',()=>{
  loadFromLS();
});

function buildDrum(){
  const g=document.getElementById('drumGrid'); g.innerHTML='';
  for(let i=1;i<=49;i++){
    const b=document.createElement('div');
    b.className='drum-ball'; b.id='drum-'+i; b.textContent=i;
    g.appendChild(b);
  }
}

function buildResultGroups(){
  groups=[];
  const c=document.getElementById('resultsContainer'); c.innerHTML='';
  for(let g=0;g<TOTAL;g++){
    groups.push({balls:[],special:null});
    const d=document.createElement('div');
    d.className='result-group'; d.id='group-'+g;
    d.innerHTML=`
      <div class="group-num">${g+1}</div>
      <div class="group-balls" id="gb-${g}">
        ${Array(7).fill(0).map((_,i)=>`<div class="result-ball empty-ball" id="slot-${g}-${i}"></div>`).join('')}
      </div>
      <div class="sep"></div>
      <div class="sort-badge" id="sort-${g}" onclick="sortGroup(${g})" style="display:none">排序</div>`;
    c.appendChild(d);
  }
}

function rebuildDrawPanelFromSave(){
  completedGroups.forEach(cg=>{
    const idx=cg.index-1;
    const grpEl=document.getElementById('group-'+idx);
    if(grpEl) grpEl.classList.remove('active');
    const allBalls=[...cg.balls, cg.special];
    allBalls.forEach((n,i)=>{
      const sl=document.getElementById(`slot-${idx}-${i}`);
      if(sl){
        sl.className='result-ball'+(i===6?' special-ball':'');
        sl.textContent=n; sl.style.animation='none';
      }
    });
    const badge=document.getElementById('sort-'+idx);
    if(badge){
      badge.style.display='block';
      if(cg.sorted){badge.textContent='✓ 已排序';badge.classList.add('done');badge.onclick=null;}
    }
    // fill groups array
    groups[idx]={balls:[...cg.balls], special:cg.special};
  });
}

// ══════════════════════════════════════
//  POOL
// ══════════════════════════════════════
function buildPool(){
  let p=Array.from({length:49},(_,i)=>i+1);
  for(let i=p.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[p[i],p[j]]=[p[j],p[i]];}
  return p;
}

// ══════════════════════════════════════
//  ROLLING — enhanced physics
// ══════════════════════════════════════
function startRoll(){
  const cells=document.getElementById('drumGrid').children;
  let prevPick=null;
  rollInterval=setInterval(()=>{
    if(prevPick) prevPick.style.cssText='';
    let cands=[];
    for(let el of cells){
      const n=parseInt(el.textContent);
      if(!globalDrawn.has(n)){ el.className='drum-ball'; cands.push(el); }
    }
    if(!cands.length) return;
    const pick=cands[Math.floor(Math.random()*cands.length)];
    const tx1=`${(Math.random()-.5)*4}px`, ty1=`${(Math.random()-.5)*4}px`;
    const tx2=`${(Math.random()-.5)*5}px`, ty2=`${(Math.random()-.5)*4}px`;
    const tx3=`${(Math.random()-.5)*3}px`, ty3=`${(Math.random()-.5)*5}px`;
    pick.className='drum-ball rolling';
    pick.style.setProperty('--tx1',tx1); pick.style.setProperty('--ty1',ty1);
    pick.style.setProperty('--tx2',tx2); pick.style.setProperty('--ty2',ty2);
    pick.style.setProperty('--tx3',tx3); pick.style.setProperty('--ty3',ty3);
    pick.style.animation=`droll ${0.10+Math.random()*.08}s infinite`;
    const rn=document.getElementById('rollingNum');
    rn.textContent=pick.textContent; rn.className='rolling-num on';
    prevPick=pick;
  },90);
}
function stopRoll(){
  clearInterval(rollInterval); rollInterval=null;
  for(let el of document.getElementById('drumGrid').children){
    if(el.classList.contains('rolling')){el.className='drum-ball';el.style.cssText='';}
  }
  document.getElementById('rollingNum').className='rolling-num';
}

// ══════════════════════════════════════
//  MACHINE
// ══════════════════════════════════════
function startMachine(){
  if(isRunning||currentGroup>=TOTAL) return;
  getCtx(); playSFXStart();
  isRunning=true; drawnCount=0;
  // 第一組才初始化共用球池
  if(currentGroup===0){
    globalPool=buildPool(); globalIdx=0; globalDrawn=new Set();
    buildDrum(); // 全新球池，重建鼓面
  }
  document.getElementById('group-'+currentGroup).classList.add('active');
  const remain=49-globalIdx;
  setStatus(`第 ${currentGroup+1} 組開獎中… 球池剩餘 ${remain} 顆`,false);
  startRoll(); startRollSound();
  setBtns(false,true,false);
  const slot=document.getElementById('exitSlot');
  slot.className='exit-slot empty'; slot.textContent='?';
}

function stopBall(){
  if(!isRunning||drawnCount>=7) return;
  stopRoll(); stopRollSound();

  const ballNum=globalPool[globalIdx]; globalIdx++; drawnCount++;
  globalDrawn.add(ballNum);
  const isSpecial=(drawnCount===7);

  playSFXStop(isSpecial);
  // TTS — slight delay so sfx plays first
  setTimeout(()=>speakNumber(ballNum, isSpecial), isSpecial?400:200);

  const slot=document.getElementById('exitSlot');
  slot.className=(isSpecial?'exit-slot special special-glow pop':'exit-slot pop');
  slot.textContent=ballNum;
  setTimeout(()=>slot.classList.remove('pop'),380);

  const drumEl=document.getElementById('drum-'+ballNum);
  if(drumEl){drumEl.className='drum-ball drawn'; drumEl.style.cssText='';}

  const slotEl=document.getElementById(`slot-${currentGroup}-${drawnCount-1}`);
  if(slotEl){slotEl.className='result-ball'+(isSpecial?' special-ball':'');slotEl.textContent=ballNum;}

  if(isSpecial) groups[currentGroup].special=ballNum;
  else groups[currentGroup].balls.push(ballNum);

  if(isSpecial){
    setStatus(`🎉 特別號 ${ballNum} 出爐！第 ${currentGroup+1} 組完成`,true);
    setBtns(true,false,false);
    document.getElementById('sort-'+currentGroup).style.display='block';

    completedGroups.push({
      index:currentGroup+1,
      balls:[...groups[currentGroup].balls],
      special:groups[currentGroup].special,
      sorted:false,
      time:new Date().toLocaleTimeString('zh-TW')
    });
    saveToLS();
    updateReport();

    setTimeout(()=>{
      currentGroup++;
      isRunning=false;
      slot.className='exit-slot empty'; slot.textContent='?';
      if(currentGroup<TOTAL){
        const remain=49-globalIdx;
        setStatus(`第 ${currentGroup} 組完成，按「開始」繼續（球池剩餘 ${remain} 顆）`,false);
        setBtns(true,false,true);
      } else {
        playSFXComplete();
        setStatus('🏆 全部 7 組開獎完畢！',true);
        setBtns(false,false,true);
        confetti();
        setTimeout(showModal, 900);
      }
    },1800);
  } else {
    const remain=49-globalIdx;
    setStatus(`第 ${currentGroup+1} 組 · 已開出 ${drawnCount}/7 顆 · 球池剩餘 ${remain} 顆`,false);
    startRoll(); startRollSound();
  }
}

// ══════════════════════════════════════
//  SORT (single group)
// ══════════════════════════════════════
function sortGroup(g){
  const grp=document.getElementById('gb-'+g);
  const slots=grp.querySelectorAll('.result-ball');
  const nums=[]; let sp=null;
  slots.forEach((s,i)=>{ if(i<6) nums.push(parseInt(s.textContent)); else sp=parseInt(s.textContent); });
  nums.sort((a,b)=>a-b);
  slots.forEach((s,i)=>{ if(i<6){s.textContent=nums[i];s.className='result-ball';}else{s.textContent=sp;s.className='result-ball special-ball';} });
  const badge=document.getElementById('sort-'+g);
  badge.textContent='✓ 已排序'; badge.classList.add('done'); badge.onclick=null;
  const cg=completedGroups.find(c=>c.index===g+1);
  if(cg){cg.balls=[...nums]; cg.sorted=true; saveToLS(); updateReport();}
}

// ══════════════════════════════════════
//  SORT ALL
// ══════════════════════════════════════
function sortAllGroups(){
  completedGroups.forEach(cg=>{
    if(!cg.sorted){
      cg.balls.sort((a,b)=>a-b);
      cg.sorted=true;
      // update draw panel
      const idx=cg.index-1;
      const grp=document.getElementById('gb-'+idx);
      if(grp){
        const slots=grp.querySelectorAll('.result-ball');
        cg.balls.forEach((n,i)=>{ if(slots[i]){slots[i].textContent=n;slots[i].className='result-ball';} });
      }
      const badge=document.getElementById('sort-'+idx);
      if(badge){badge.textContent='✓ 已排序';badge.classList.add('done');badge.onclick=null;}
    }
  });
  saveToLS(); updateReport();
}

// ══════════════════════════════════════
//  RESET
// ══════════════════════════════════════
function resetAll(){
  document.getElementById('confirmOverlay').style.display='flex';
}
function doReset(){
  document.getElementById('confirmOverlay').style.display='none';
  isRunning=false; currentGroup=0; drawnCount=0;
  globalPool=[]; globalIdx=0; globalDrawn=new Set();
  completedGroups=[];
  stopRoll(); stopRollSound();
  window.speechSynthesis.cancel();
  try{ localStorage.removeItem(LS_KEY); }catch(e){}
  const slot=document.getElementById('exitSlot');
  slot.className='exit-slot empty'; slot.textContent='?';
  document.getElementById('rollingNum').className='rolling-num';
  setStatus('按「開始」啟動滾筒',false);
  setBtns(true,false,false);
  buildDrum(); buildResultGroups(); updateReport();
}
function cancelReset(){
  document.getElementById('confirmOverlay').style.display='none';
}

// ══════════════════════════════════════
//  MODAL
// ══════════════════════════════════════
function showModal(){
  const body=document.getElementById('modalBody');
  body.innerHTML=completedGroups.map(cg=>{
    const sorted=[...cg.balls].sort((a,b)=>a-b);
    return `<div class="modal-row">
      <div class="modal-idx">${cg.index}</div>
      <div class="modal-balls">
        ${sorted.map(n=>`<div class="modal-ball">${n}</div>`).join('')}
        <div class="rc-divider"></div>
        <div class="modal-ball sp">${cg.special}</div>
      </div>
    </div>`;
  }).join('');
  document.getElementById('modalOverlay').style.display='flex';
}
function closeModal(e){
  if(e.target===document.getElementById('modalOverlay'))
    document.getElementById('modalOverlay').style.display='none';
}

// ══════════════════════════════════════
//  HELPERS
// ══════════════════════════════════════
function setStatus(msg,gold){
  const el=document.getElementById('statusText');
  el.textContent=msg; el.className=gold?'status-bar gold':'status-bar';
}
function setBtns(start,stop,reset){
  document.getElementById('btnStart').disabled=!start;
  document.getElementById('btnStop').disabled=!stop;
  document.getElementById('btnReset').disabled=!reset;
}
function switchTab(tab){
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',['draw','report'][i]===tab));
  document.getElementById('panelDraw').classList.toggle('active',tab==='draw');
  document.getElementById('panelReport').classList.toggle('active',tab==='report');
}

// ══════════════════════════════════════
//  REPORT UPDATE
// ══════════════════════════════════════
function updateReport(){
  const hasData=completedGroups.length>0;
  document.getElementById('btnExport').disabled=!hasData;
  document.getElementById('btnSortAll').disabled=!hasData;
  const content=document.getElementById('reportContent');
  if(!hasData){
    content.innerHTML='<div class="report-empty">尚無開獎記錄<br><span style="font-size:11px;opacity:.6">完成至少一組後即可查看</span></div>';
    return;
  }
  content.innerHTML=completedGroups.map(cg=>`
    <div class="report-card">
      <div class="rc-head">
        <div class="rc-num">${cg.index}</div>
        <div>
          <div class="rc-label">第 ${cg.index} 組開獎結果</div>
          ${cg.sorted?'<span class="rc-sorted-tag">✓ 已排序</span>':''}
        </div>
        <div class="rc-time">${cg.time}</div>
      </div>
      <div class="rc-balls">
        ${cg.balls.map(n=>`<div class="rc-ball">${n}</div>`).join('')}
        <div class="rc-divider"></div>
        <div class="rc-ball sp">${cg.special}</div>
      </div>
    </div>`).join('');
}

// ══════════════════════════════════════
//  EXCEL EXPORT
// ══════════════════════════════════════
function exportExcel(){
  if(!completedGroups.length) return;
  const wb=XLSX.utils.book_new();
  const now=new Date();

  // ── Sheet 1: 開獎明細 ──
  const detail=[['組別','號碼1','號碼2','號碼3','號碼4','號碼5','號碼6','特別號','開獎時間','是否排序']];
  completedGroups.forEach(cg=>{
    detail.push([`第${cg.index}組`,...cg.balls,cg.special,cg.time,cg.sorted?'是':'否']);
  });
  const ws1=XLSX.utils.aoa_to_sheet(detail);
  ws1['!cols']=[{wch:8},{wch:7},{wch:7},{wch:7},{wch:7},{wch:7},{wch:7},{wch:8},{wch:12},{wch:8}];
  applyHeaderStyle(ws1,detail[0].length);
  XLSX.utils.book_append_sheet(wb,ws1,'開獎明細');

  // ── Sheet 2: 摘要 ──
  const sumData=[
    ['大樂透開獎報告','',''],
    ['產生時間',now.toLocaleString('zh-TW'),''],
    ['總組數',completedGroups.length,''],
    ['','',''],
    ['組別','普球（排序後）','特別號']
  ];
  completedGroups.forEach(cg=>{
    const sorted=[...cg.balls].sort((a,b)=>a-b);
    sumData.push([`第${cg.index}組`,sorted.join('、'),cg.special]);
  });
  const ws2=XLSX.utils.aoa_to_sheet(sumData);
  ws2['!cols']=[{wch:8},{wch:28},{wch:8}];
  applyHeaderStyle(ws2,3,4);
  XLSX.utils.book_append_sheet(wb,ws2,'摘要');

  // ── Sheet 3: 號碼頻率 ──
  const freq={};
  for(let i=1;i<=49;i++) freq[i]={r:0,s:0};
  completedGroups.forEach(cg=>{
    cg.balls.forEach(n=>freq[n].r++);
    freq[cg.special].s++;
  });
  const freqRows=[['號碼','普球次數','特別號次數','合計']];
  for(let i=1;i<=49;i++) freqRows.push([i,freq[i].r,freq[i].s,freq[i].r+freq[i].s]);
  const ws3=XLSX.utils.aoa_to_sheet(freqRows);
  ws3['!cols']=[{wch:7},{wch:9},{wch:11},{wch:7}];
  applyHeaderStyle(ws3,4);
  XLSX.utils.book_append_sheet(wb,ws3,'號碼頻率');

  // ── Sheet 4: 冷熱門分析 ──
  const allFreq=Object.entries(freq)
    .map(([n,v])=>({num:parseInt(n),total:v.r+v.s,regular:v.r,special:v.s}))
    .sort((a,b)=>b.total-a.total);

  const hotRows=[['排名','號碼','普球次數','特別號次數','合計','熱度']];
  allFreq.forEach((row,idx)=>{
    let heat='';
    if(idx<3) heat='🔥 熱門';
    else if(idx>=46) heat='❄️ 冷門';
    else heat='－';
    hotRows.push([idx+1,row.num,row.regular,row.special,row.total,heat]);
  });
  const ws4=XLSX.utils.aoa_to_sheet(hotRows);
  ws4['!cols']=[{wch:6},{wch:7},{wch:9},{wch:11},{wch:7},{wch:10}];
  applyHeaderStyle(ws4,6);
  // color top 3 rows gold, bottom 3 blue
  for(let r=1;r<=hotRows.length-1;r++){
    const isHot=r<=3, isCold=r>=hotRows.length-3;
    if(!isHot&&!isCold) continue;
    for(let c=0;c<6;c++){
      const addr=XLSX.utils.encode_cell({r,c});
      if(!ws4[addr]) continue;
      ws4[addr].s={
        font:{bold:isHot, color:{rgb:isHot?'7A3800':'003399'}},
        fill:{fgColor:{rgb:isHot?'FFF0A0':'D0E8FF'}}
      };
    }
  }
  XLSX.utils.book_append_sheet(wb,ws4,'冷熱門分析');

  const fname=`大樂透開獎_${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}_${String(now.getHours()).padStart(2,'0')}${String(now.getMinutes()).padStart(2,'0')}.xlsx`;
  XLSX.writeFile(wb,fname);
}

function applyHeaderStyle(ws,cols,row=0){
  for(let c=0;c<cols;c++){
    const addr=XLSX.utils.encode_cell({r:row,c});
    if(!ws[addr]) continue;
    ws[addr].s={
      font:{bold:true,color:{rgb:'3D2000'}},
      fill:{fgColor:{rgb:'F5C842'}},
      alignment:{horizontal:'center'}
    };
  }
}

// ══════════════════════════════════════
//  CONFETTI
// ══════════════════════════════════════
function confetti(){
  const colors=['#f5c842','#bf55ff','#ff5555','#55ffaa','#ffffff','#ff9900'];
  for(let i=0;i<100;i++){
    const el=document.createElement('div');
    const s=5+Math.random()*9;
    el.style.cssText=`position:fixed;left:${Math.random()*100}vw;top:-12px;width:${s}px;height:${s}px;background:${colors[~~(Math.random()*colors.length)]};border-radius:${Math.random()>.5?'50%':'2px'};z-index:400;pointer-events:none;animation:fall ${1.5+Math.random()*2.5}s ease-in forwards;animation-delay:${Math.random()*.9}s;`;
    document.body.appendChild(el); setTimeout(()=>el.remove(),4500);
  }
  if(!document.getElementById('fallSty')){
    const s=document.createElement('style'); s.id='fallSty';
    s.textContent='@keyframes fall{0%{transform:translateY(0) rotate(0);opacity:1;}100%{transform:translateY(110vh) rotate(720deg);opacity:0;}}';
    document.head.appendChild(s);
  }
}
</script>
</body>
</html>
